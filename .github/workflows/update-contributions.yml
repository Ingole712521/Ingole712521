name: Update OSS Contributions

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests

      - name: Generate Contributions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: Ingole712521
        run: python scripts/update_contributions.py

      - name: Commit README
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md

          git diff --cached --quiet || git commit -m "chore: update OSS contributions"
          git push
